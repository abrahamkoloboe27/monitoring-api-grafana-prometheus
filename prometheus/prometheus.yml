global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8123"]
    metrics_path: /metrics

  - job_name: "frontend-react"
    static_configs:
      - targets: ["frontend-react:3001"]
    metrics_path: /metrics

  - job_name: "frontend-vue"
    static_configs:
      - targets: ["frontend-vue:3002"]
    metrics_path: /metrics
