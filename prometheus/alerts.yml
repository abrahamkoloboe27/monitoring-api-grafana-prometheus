# Prometheus Alert Rules
# Referenced by prometheus.yml via rule_files.
# These rules are evaluated by Prometheus itself; to send notifications you
# need to configure an Alertmanager. Grafana Unified Alerting (see
# grafana/provisioning/alerting/rules.yml) covers the same use-cases without
# requiring a separate Alertmanager.

groups:
  # ── Availability ────────────────────────────────────────────────────────────
  - name: availability
    rules:
      - alert: FrontendDown
        expr: up{job=~"frontend.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Frontend {{ $labels.job }} is DOWN"
          description: "Prometheus cannot reach {{ $labels.job }} (instance {{ $labels.instance }}). The service may be crashed or unreachable."

      - alert: APIDown
        expr: up{job="fastapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI backend is DOWN"
          description: "Prometheus cannot scrape the FastAPI metrics endpoint ({{ $labels.instance }})."

      - alert: APIHealthNotSuccessful
        # Fires when the /health route has received no 2xx responses in 5 min.
        # noDataState means absent() fires the alert if the metric doesn't exist.
        expr: |
          sum(increase(http_requests_total{handler="/health", status=~"2.."}[5m])) < 1
          or absent(http_requests_total{handler="/health"})
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API /health endpoint is not returning success"
          description: "The FastAPI /health endpoint has not returned a 2xx response in the last 5 minutes."

  # ── Error Rates ─────────────────────────────────────────────────────────────
  - name: error-rates
    rules:
      - alert: APIHigh4xxRate
        expr: sum(rate(http_requests_total{status=~"4.."}[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate on the API (>0.5 req/s)"
          description: "The FastAPI backend is returning more than 0.5 requests/s with 4xx status codes over the last 5 minutes."

      - alert: APIHigh5xxRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on the API (>0.05 req/s)"
          description: "The FastAPI backend is returning more than 0.05 requests/s with 5xx status codes over the last 5 minutes."

      - alert: FrontendHigh4xxRate
        expr: sum by (app) (rate(frontend_http_requests_total{status_code=~"4.."}[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate on frontend {{ $labels.app }} (>0.5 req/s)"
          description: "The {{ $labels.app }} frontend is returning more than 0.5 requests/s with 4xx status codes."

      - alert: FrontendHigh5xxRate
        expr: sum by (app) (rate(frontend_http_requests_total{status_code=~"5.."}[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on frontend {{ $labels.app }} (>0.05 req/s)"
          description: "The {{ $labels.app }} frontend is returning more than 0.05 requests/s with 5xx status codes."

  # ── Performance ──────────────────────────────────────────────────────────────
  - name: performance
    rules:
      - alert: APIHighLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency exceeds 1 second"
          description: "The 99th percentile response time of the FastAPI backend has been above 1s for 2 minutes."

      - alert: FrontendHighLatency
        expr: histogram_quantile(0.99, sum by (app, le) (rate(frontend_http_request_duration_seconds_bucket[5m]))) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Frontend {{ $labels.app }} p99 latency exceeds 1 second"
          description: "The 99th percentile response time of the {{ $labels.app }} frontend has been above 1s for 2 minutes."
