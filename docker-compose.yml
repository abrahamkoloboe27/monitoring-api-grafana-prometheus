services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastapi_app
    ports:
      - "8123:8123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: frontend_react
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - API_URL=http://api:8123
    depends_on:
      - api
    restart: unless-stopped

  frontend-vue:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: frontend_vue
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - API_URL=http://api:8123
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    depends_on:
      - api
      - frontend-react
      - frontend-vue

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Unified Alerting (enabled by default in Grafana 10, kept explicit for clarity)
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      # SMTP – set real values in a .env file or override here
      # Copy .env.example to .env and fill in the values.
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-grafana@example.com}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-Grafana Monitoring}
      - GF_SMTP_STARTTLS_POLICY=${GF_SMTP_STARTTLS_POLICY:-MandatoryStartTLS}
      # Alert contact-point variables (used in alerting/contactpoints.yml)
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-team@example.com}
      - GOOGLECHAT_WEBHOOK_URL=${GOOGLECHAT_WEBHOOK_URL:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
