# Grafana Unified Alerting – Notification Policies
# Docs: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
#
# Default policy: send all alerts to email.
# Critical alerts are also forwarded to Google Chat.

apiVersion: 1

policies:
  - orgId: 1
    receiver: email-alerts          # default contact point for all alerts
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts also go to Google Chat
      - receiver: googlechat-alerts
        matchers:
          - severity = critical
        continue: true              # keep forwarding to the parent (email) as well
